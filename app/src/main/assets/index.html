<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 遮罩层 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        /* 警告弹窗容器 */
        .warn-modal {
            width: 320px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.2);
        }

        /* 弹窗头部 */
        .modal-header {
            padding: 16px;
            background-color: #ff7d00;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 内容区域 */
        .modal-content {
            padding: 20px 16px;
            font-size: 15px;
            color: #333;
            line-height: 1.6;
        }

        /* 底部双按钮 */
        .modal-footer {
            display: flex;
            border-top: 1px solid #eee;
        }

        .modal-btn {
            flex: 1;
            text-align: center;
            line-height: 44px;
            cursor: pointer;
            font-size: 15px;
            border: none;
            background: #fff;
        }
        /* 分割线 */
        .modal-btn:first-child {
            border-right: 1px solid #eee;
        }

        .modal-btn.cancel {
            color: #666;
        }
        .modal-btn.confirm {
            color: #ff7d00;
            font-weight: bold;
        }

        .modal-btn:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <!-- 自定义警告对话框 -->
    <div class="modal-mask" id="warnMask">
        <div class="warn-modal">
            <div class="modal-header">
                <span>⚠️</span>
                <span id="modalTitle">警告</span>
            </div>
            <div class="modal-content" id="modalText">
                提示内容
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeWarnModal()">取消</button>
                <button class="modal-btn confirm" id="okBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        let confirmCallback = null;

        // 打开弹窗
        function showWarnModal(title, text, callback) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('warnMask').style.display = 'flex';
            confirmCallback = callback;
        }

        // 关闭弹窗
        function closeWarnModal() {
            document.getElementById('warnMask').style.display = 'none';
            confirmCallback = null;
            AndroidBridge.no();
        }

        // 确定按钮事件
        document.getElementById('okBtn').addEventListener('click', function(){
            AndroidBridge.yes();
            if(typeof confirmCallback === 'function'){
                confirmCallback();
            }
        });

        window.onload = function() {
            // 这里可以自定义标题和内容
            showWarnModal('警告', '确定要执行该操作吗？');
        };
    </script>
</body>
</html>
